name: Actualizar datos del panel

on:
  schedule:
    - cron: "*/30 14-21 * * 1-5"
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generar data.json
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python build_data.py
      - name: Publicar data.json
        run: |
          git config user.name  "panel-bot"
          git config user.email "panel-bot@users.noreply.github.com"
          git add data.json
          git commit -m "data: actualizacion automatica" || echo "sin cambios"
          git push
