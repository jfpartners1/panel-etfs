name: update-history-fondos

# Regenera history_fondos.json (NAV historico de los fondos UCITS, en EUR) una vez
# por semana. ~75 llamadas a EODHD por ejecucion. Tambien se puede lanzar a mano.

on:
  schedule:
    - cron: "20 6 * * 1"      # lunes 06:20 UTC (tras el de ETFs, que va a las 06:10)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Generar history_fondos.json
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python build_history_fondos.py

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add history_fondos.json
          git diff --staged --quiet || git commit -m "Actualizar history_fondos.json"
          git push
