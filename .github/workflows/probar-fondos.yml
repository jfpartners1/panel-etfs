name: probar-fondos

# Workflow TEMPORAL de diagnóstico: comprueba qué fondos UCITS (por ISIN) tienen
# datos en EODHD. Solo se ejecuta a mano (no tiene cron). No hace commit: el
# resultado aparece en el log de la ejecución (pestaña Actions). Cuesta ~17 llamadas.
# Cuando termines de revisar, puedes borrar este archivo y probar_fondos.py.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probar fondos
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
        run: python probar_fondos.py
